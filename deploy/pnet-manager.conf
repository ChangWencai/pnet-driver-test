# p-net IO Device Manager Configuration
# ====================================

# --- Device Identity ---
product_name = p-net IO Device
station_name = iodevice1
vendor_id = 0x0001
device_id = 0x0001

# --- Network ---
interface = eth0
ip_addr = 192.168.0.100
netmask = 255.255.255.0
gateway = 192.168.0.1

# --- Profinet Stack ---
tick_us = 1000
send_hello = 1

# --- Real-Time ---
realtime_enabled = 1
rt_priority = 80
lock_memory = 1
isolate_cpu = -1

# --- Security ---
security_enabled = 1

# --- Logging ---
# 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG
log_level = 2
log_file = /var/log/pnet-manager/pnet-manager.log

# --- Storage ---
file_directory = /var/lib/pnet-manager
